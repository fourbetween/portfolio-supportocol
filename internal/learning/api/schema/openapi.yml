openapi: 3.1.0
info:
  title: app-supportocol learning api
  version: 1.0.0
components:
  securitySchemes:
    cookie_auth:
      type: apiKey
      in: cookie
      name: auth_token
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
      required:
        - code
        - message
    Id:
      type: string
      format: uuid
    CommentStatus:
      type: string
      enum:
        - active
        - proposed
    CommentIssueStatus:
      type: string
      enum:
        - active
        - proposed
    IssueStatus:
      type: string
      enum:
        - open
        - closed
    Issue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        issueType:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/IssueStatus"
      required:
        - id
        - issueType
        - description
        - status
    DialogueSettings:
      type: object
      properties:
        commentFrame:
          $ref: "#/components/schemas/CommentFrame"
      required:
        - commentFrame
    CommentFrame:
      type: object
      properties:
        types:
          type: array
          items:
            $ref: "#/components/schemas/CommentType"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/CommentPath"
      required:
        - types
        - paths
    CommentPath:
      type: object
      properties:
        child:
          $ref: "#/components/schemas/CommentType"
        parent:
          $ref: "#/components/schemas/CommentType"
      required:
        - child
        - parent
    DiscussionStatus:
      type: string
      enum:
        - private
        - public
    DiscussionTheme:
      type: string
      maxLength: 255
    DiscussionConclusion:
      type: string
      maxLength: 1000
    CommentType:
      type: string
      maxLength: 20
    CommentContent:
      type: string
      maxLength: 400
    DiscussionSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        projectId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        status:
          $ref: "#/components/schemas/DiscussionStatus"
        archivedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        lastCommentedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - theme
        - status
        - archivedAt
        - lastCommentedAt
    Discussion:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        projectId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        conclusion:
          $ref: "#/components/schemas/DiscussionConclusion"
        status:
          $ref: "#/components/schemas/DiscussionStatus"
        archivedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        dialogueSettings:
          $ref: "#/components/schemas/DialogueSettings"
      required:
        - id
        - projectId
        - theme
        - conclusion
        - status
        - archivedAt
    Comment:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        discussionId:
          $ref: "#/components/schemas/Id"
        parentCommentId:
          anyOf:
            - $ref: "#/components/schemas/Id"
            - type: "null"
        commentType:
          $ref: "#/components/schemas/CommentType"
        content:
          $ref: "#/components/schemas/CommentContent"
        status:
          $ref: "#/components/schemas/CommentStatus"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/CommentIssue"
        createdAt:
          type: string
          format: date-time
        archivedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
      required:
        - id
        - discussionId
        - parentCommentId
        - commentType
        - content
        - status
        - issues
        - createdAt
        - archivedAt
    CommentIssue:
      type: object
      properties:
        issueId:
          $ref: "#/components/schemas/Id"
        status:
          $ref: "#/components/schemas/CommentIssueStatus"
      required:
        - issueId
        - status
  parameters:
    workspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    discussionId:
      name: discussionId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    commentId:
      name: commentId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    issueId:
      name: issueId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
security:
  - cookie_auth: []
paths:
  /v1/learning/issues:
    get:
      description: list issues
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      description: get discussions
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Id"
        - name: archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscussionSummary"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  $ref: "#/components/schemas/Id"
                theme:
                  $ref: "#/components/schemas/DiscussionTheme"
                status:
                  $ref: "#/components/schemas/DiscussionStatus"
              required:
                - projectId
                - theme
                - status
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    get:
      description: get discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      description: update discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  $ref: "#/components/schemas/Id"
                theme:
                  $ref: "#/components/schemas/DiscussionTheme"
                conclusion:
                  $ref: "#/components/schemas/DiscussionConclusion"
              required:
                - projectId
                - theme
                - conclusion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: delete discussion
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/status:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    put:
      description: update discussion status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/DiscussionStatus"
                commentFrame:
                  $ref: "#/components/schemas/CommentFrame"
              required:
                - status
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/archive:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    post:
      description: archive discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: unarchive discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    get:
      description: get comments for a discussion
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  anyOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
                commentType:
                  $ref: "#/components/schemas/CommentType"
                content:
                  $ref: "#/components/schemas/CommentContent"
              required:
                - parentCommentId
                - commentType
                - content
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    put:
      description: update comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                commentType:
                  $ref: "#/components/schemas/CommentType"
                content:
                  $ref: "#/components/schemas/CommentContent"
              required:
                - commentType
                - content
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: delete comment
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/status:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    put:
      description: update comment status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/CommentStatus"
              required:
                - status
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/archive:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    post:
      description: archive comment
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: unarchive comment
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/issues:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    post:
      description: add issue to comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issueId:
                  $ref: "#/components/schemas/Id"
              required:
                - issueId
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
      - $ref: "#/components/parameters/issueId"
    delete:
      description: remove issue from comment
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/issues/{issueId}/status:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
      - $ref: "#/components/parameters/issueId"
    put:
      description: update comment issue status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/CommentIssueStatus"
              required:
                - status
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/generate:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    post:
      description: generate comments using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  anyOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
                commentType:
                  $ref: "#/components/schemas/CommentType"
              required:
                - parentCommentId
                - commentType
      responses:
        "202":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
