openapi: 3.1.0
info:
  title: app-supportocol learning api
  version: 1.0.0
components:
  securitySchemes:
    cookie_auth:
      type: apiKey
      in: cookie
      name: auth_token
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
      required:
        - code
        - message
    Id:
      type: string
      format: uuid
    CommentStatus:
      type: string
      enum:
        - active
        - proposed
    PermissionLevel:
      type: string
      enum:
        - everyone
        - authenticated
        - none
    DialogueSettings:
      type: object
      properties:
        commentFrame:
          $ref: "#/components/schemas/CommentFrame"
        commentPermission:
          $ref: "#/components/schemas/PermissionLevel"
        issuePermission:
          $ref: "#/components/schemas/PermissionLevel"
      required:
        - commentFrame
        - commentPermission
        - issuePermission
    CommentFrame:
      type: object
      properties:
        types:
          type: array
          items:
            $ref: "#/components/schemas/CommentType"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/CommentPath"
      required:
        - types
        - paths
    CommentPath:
      type: object
      properties:
        child:
          $ref: "#/components/schemas/CommentType"
        parent:
          $ref: "#/components/schemas/CommentType"
      required:
        - child
        - parent
    DiscussionStatus:
      type: string
      enum:
        - private
        - public
        - internal
    DiscussionTheme:
      type: string
      maxLength: 255
    DiscussionConclusion:
      type: string
      maxLength: 1000
    DiscussionPremise:
      type: string
      maxLength: 4000
    CommentType:
      type: string
      maxLength: 20
    CommentContent:
      type: string
      maxLength: 400
    CommentIssueTitle:
      type: string
      maxLength: 255
    CommentIssueDescription:
      type: string
      maxLength: 1000
    DiscussionSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        projectId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        status:
          $ref: "#/components/schemas/DiscussionStatus"
        archivedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        lastCommentedAt:
          type: string
          format: date-time
        proposedCommentsCount:
          type: integer
        issuesCount:
          type: integer
      required:
        - id
        - projectId
        - theme
        - status
        - archivedAt
        - lastCommentedAt
        - proposedCommentsCount
        - issuesCount
    Discussion:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        projectId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        premise:
          $ref: "#/components/schemas/DiscussionPremise"
        conclusion:
          $ref: "#/components/schemas/DiscussionConclusion"
        status:
          $ref: "#/components/schemas/DiscussionStatus"
        archivedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        dialogueSettings:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/DialogueSettings"
      required:
        - id
        - projectId
        - theme
        - premise
        - conclusion
        - status
        - archivedAt
        - dialogueSettings
    Comment:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        discussionId:
          $ref: "#/components/schemas/Id"
        parentCommentId:
          anyOf:
            - $ref: "#/components/schemas/Id"
            - type: "null"
        type:
          $ref: "#/components/schemas/CommentType"
        content:
          $ref: "#/components/schemas/CommentContent"
        status:
          $ref: "#/components/schemas/CommentStatus"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/CommentIssue"
        createdAt:
          type: string
          format: date-time
        archivedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
      required:
        - id
        - discussionId
        - parentCommentId
        - type
        - content
        - status
        - issues
        - createdAt
        - archivedAt
    CommentIssue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        title:
          $ref: "#/components/schemas/CommentIssueTitle"
        description:
          $ref: "#/components/schemas/CommentIssueDescription"
      required:
        - id
        - title
        - description
  parameters:
    workspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    discussionId:
      name: discussionId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    commentId:
      name: commentId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    issueId:
      name: issueId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
security:
  - cookie_auth: []
paths:
  /v1/learning/workspaces/{workspaceId}/discussions:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      description: get discussions
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Id"
        - name: archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscussionSummary"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  $ref: "#/components/schemas/Id"
                theme:
                  $ref: "#/components/schemas/DiscussionTheme"
                premise:
                  $ref: "#/components/schemas/DiscussionPremise"
                status:
                  $ref: "#/components/schemas/DiscussionStatus"
              required:
                - projectId
                - theme
                - status
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    get:
      description: get discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      description: update discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  $ref: "#/components/schemas/Id"
                theme:
                  $ref: "#/components/schemas/DiscussionTheme"
                premise:
                  $ref: "#/components/schemas/DiscussionPremise"
                conclusion:
                  $ref: "#/components/schemas/DiscussionConclusion"
              required:
                - projectId
                - theme
                - premise
                - conclusion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: delete discussion
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/status:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    put:
      description: update discussion status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/DiscussionStatus"
                commentFrame:
                  $ref: "#/components/schemas/CommentFrame"
                commentPermission:
                  $ref: "#/components/schemas/PermissionLevel"
                issuePermission:
                  $ref: "#/components/schemas/PermissionLevel"
              required:
                - status
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/archive:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    post:
      description: archive discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: unarchive discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    get:
      description: get comments for a discussion
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      description: replace all comments in a discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: array
                  items:
                    type: object
                    properties:
                      parentIndex:
                        anyOf:
                          - type: integer
                            minimum: 0
                          - type: "null"
                      commentType:
                        $ref: "#/components/schemas/CommentType"
                      content:
                        $ref: "#/components/schemas/CommentContent"
                    required:
                      - parentIndex
                      - commentType
                      - content
              required:
                - comments
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  anyOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
                commentType:
                  $ref: "#/components/schemas/CommentType"
                content:
                  $ref: "#/components/schemas/CommentContent"
              required:
                - parentCommentId
                - commentType
                - content
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    put:
      description: update comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                commentType:
                  $ref: "#/components/schemas/CommentType"
                content:
                  $ref: "#/components/schemas/CommentContent"
              required:
                - commentType
                - content
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: delete comment
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/parent:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    put:
      description: update comment parent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  anyOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
              required:
                - parentCommentId
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/status:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    put:
      description: update comment status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/CommentStatus"
              required:
                - status
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/archive:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    post:
      description: archive comment
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: unarchive comment
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
      - $ref: "#/components/parameters/issueId"
    delete:
      description: remove issue from comment
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/comment-type:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    put:
      description: rename comment type in a discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldType:
                  $ref: "#/components/schemas/CommentType"
                newType:
                  $ref: "#/components/schemas/CommentType"
              required:
                - oldType
                - newType
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/learning/workspaces/{workspaceId}/discussions/{discussionId}/comments/generate:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    post:
      description: generate comments using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  anyOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
                commentType:
                  $ref: "#/components/schemas/CommentType"
              required:
                - parentCommentId
                - commentType
      responses:
        "202":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
