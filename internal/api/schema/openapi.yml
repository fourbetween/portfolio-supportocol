openapi: 3.1.0
info:
  title: app-supportocol api
  version: 1.0.0
components:
  securitySchemes:
    cookie_auth:
      type: apiKey
      in: cookie
      name: auth_token
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
      required:
        - code
        - message
    GoogleLoginRequest:
      type: object
      properties:
        idToken:
          type: string
      required:
        - idToken
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
      required:
        - id
        - email
        - name
    Id:
      type: string
      minLength: 36
      maxLength: 36
    Project:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        name:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdBy
        - createdAt
    CommentType:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        no:
          type: integer
          minimum: 0
        name:
          type: string
        description:
          type: string
        color:
          type: string
        root:
          type: boolean
      required:
        - id
        - no
        - name
        - description
        - color
        - root
    CommentTypePath:
      type: object
      properties:
        childCommentTypeId:
          $ref: "#/components/schemas/Id"
        parentCommentTypeId:
          $ref: "#/components/schemas/Id"
      required:
        - childCommentTypeId
        - parentCommentTypeId
    Rule:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        name:
          type: string
        description:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        commentTypes:
          type: array
          items:
            $ref: "#/components/schemas/CommentType"
        commentTypePaths:
          type: array
          items:
            $ref: "#/components/schemas/CommentTypePath"
      required:
        - id
        - name
        - description
        - createdBy
        - createdAt
        - commentTypes
        - commentTypePaths
    VisibilityLevel:
      type: string
      enum:
        - everyone
        - authenticated
        - owner
    CommentPermissionLevel:
      type: string
      enum:
        - everyone
        - authenticated
        - owner
    Discussion:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        theme:
          type: string
        background:
          type: string
        conclusion:
          type: string
        ruleId:
          $ref: "#/components/schemas/Id"
        visibilityLevel:
          $ref: "#/components/schemas/VisibilityLevel"
        commentPermissionLevel:
          $ref: "#/components/schemas/CommentPermissionLevel"
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - open
            - closed
            - archived
      required:
        - id
        - theme
        - background
        - conclusion
        - ruleId
        - visibilityLevel
        - commentPermissionLevel
        - createdBy
        - createdAt
        - status
    CommentStatus:
      type: string
      enum:
        - unassigned
        - assigned
        - archived
        - deleted
    Comment:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        discussionId:
          $ref: "#/components/schemas/Id"
        parentCommentId:
          $ref: "#/components/schemas/Id"
        commentTypeId:
          $ref: "#/components/schemas/Id"
        content:
          type: string
        postedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/CommentStatus"
      required:
        - id
        - discussionId
        - parentCommentId
        - commentTypeId
        - content
        - postedBy
        - createdAt
        - status
    Issue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        commentId:
          $ref: "#/components/schemas/Id"
        issueType:
          type: string
          enum:
            - contradiction
            - circular_logic
        description:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - commentId
        - issueType
        - description
        - createdBy
        - createdAt
    Note:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        discussionId:
          $ref: "#/components/schemas/Id"
        content:
          type: string
        postedBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - discussionId
        - content
        - postedBy
        - createdAt
  parameters: {}
paths:
  /auth/google:
    post:
      description: google login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      description: logout
      responses:
        "200":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
