openapi: 3.1.0
info:
  title: app-supportocol workspace api
  version: 1.0.0
components:
  securitySchemes:
    cookie_auth:
      type: apiKey
      in: cookie
      name: auth_token
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
      required:
        - code
        - message
    Id:
      type: string
      format: uuid
    WorkspaceSlug:
      type: string
      maxLength: 20
      pattern: "^[a-z0-9-]+$"
    WorkspaceName:
      type: string
      maxLength: 255
    WorkspaceType:
      type: string
      enum:
        - personal
        - organization
    MemberRole:
      type: string
      enum:
        - owner
        - admin
        - member
    ProjectName:
      type: string
      maxLength: 255
    ProjectPremise:
      type: string
      maxLength: 1000
    DiscussionTheme:
      type: string
      maxLength: 255
    DiscussionStatus:
      type: string
      enum:
        - public
        - internal
    SubscriptionStatus:
      type: string
      enum:
        - active
        - canceled
        - past_due
    Plan:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        name:
          type: string
        monthlyAiLimit:
          type: integer
      required:
        - id
        - name
        - monthlyAiLimit
    Subscription:
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/Plan"
        status:
          $ref: "#/components/schemas/SubscriptionStatus"
        currentPeriodStart:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
      required:
        - plan
        - status
        - currentPeriodStart
        - currentPeriodEnd
    Workspace:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        slug:
          $ref: "#/components/schemas/WorkspaceSlug"
        name:
          $ref: "#/components/schemas/WorkspaceName"
        type:
          $ref: "#/components/schemas/WorkspaceType"
        subscription:
          $ref: "#/components/schemas/Subscription"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - type
        - subscription
        - createdAt
    WorkspaceWithMember:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/Workspace"
        member:
          $ref: "#/components/schemas/Member"
      required:
        - workspace
        - member
    Member:
      type: object
      properties:
        workspaceId:
          $ref: "#/components/schemas/Id"
        userId:
          $ref: "#/components/schemas/Id"
        role:
          $ref: "#/components/schemas/MemberRole"
        createdAt:
          type: string
          format: date-time
      required:
        - workspaceId
        - userId
        - role
        - createdAt
    Project:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        workspaceId:
          $ref: "#/components/schemas/Id"
        name:
          $ref: "#/components/schemas/ProjectName"
        premise:
          $ref: "#/components/schemas/ProjectPremise"
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - workspaceId
        - name
        - premise
        - isDefault
        - createdAt
    FavoriteDiscussionSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        workspaceId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        status:
          $ref: "#/components/schemas/DiscussionStatus"
        archivedAt:
          type: string
          format: date-time
        lastCommentedAt:
          type: string
          format: date-time
        commentsCount:
          type: integer
        favoritesCount:
          type: integer
      required:
        - id
        - workspaceId
        - theme
        - status
        - lastCommentedAt
        - commentsCount
        - favoritesCount
security:
  - cookie_auth: []
paths:
  /v1/workspace/me:
    get:
      description: get my workspaces
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceWithMember"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workspace/workspaces/{workspaceId}/projects:
    get:
      description: get projects
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create project
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ProjectName"
              required:
                - name
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workspace/workspaces/{workspaceId}/projects/{projectId}:
    put:
      description: update project
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
        - name: projectId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ProjectName"
                premise:
                  $ref: "#/components/schemas/ProjectPremise"
              required:
                - name
                - premise
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: delete project
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
        - name: projectId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workspace/workspaces/{workspaceId}/discussions/{discussionId}/favorite:
    put:
      description: add discussion to favorites
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
        - name: discussionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      description: remove discussion from favorites
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
        - name: discussionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "204":
          description: success response
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workspace/workspaces/{workspaceId}/favorites:
    get:
      description: get favorite discussions
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FavoriteDiscussionSummary"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
