openapi: 3.1.0
info:
  title: app-supportocol dialogue api
  version: 1.0.0
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
      required:
        - code
        - message
    Id:
      type: string
      format: uuid
    CommentStatus:
      type: string
      enum:
        - active
        - proposed
    IssueStatus:
      type: string
      enum:
        - open
        - closed
    Issue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        issueType:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/IssueStatus"
      required:
        - id
        - issueType
        - description
        - status
    DialogueSettings:
      type: object
      properties:
        discussionId:
          $ref: "#/components/schemas/Id"
        commentFrame:
          $ref: "#/components/schemas/CommentFrame"
      required:
        - discussionId
        - commentFrame
    CommentFrame:
      type: object
      properties:
        types:
          type: array
          items:
            $ref: "#/components/schemas/CommentType"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/CommentPath"
      required:
        - types
        - paths
    CommentPath:
      type: object
      properties:
        child:
          $ref: "#/components/schemas/CommentType"
        parent:
          $ref: "#/components/schemas/CommentType"
      required:
        - child
        - parent
    DiscussionTheme:
      type: string
      maxLength: 255
    DiscussionConclusion:
      type: string
      maxLength: 1000
    CommentType:
      type: string
      maxLength: 20
    CommentContent:
      type: string
      maxLength: 400
    DiscussionSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        archivedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        lastCommentedAt:
          type: string
          format: date-time
      required:
        - id
        - theme
        - archivedAt
        - lastCommentedAt
    Discussion:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        conclusion:
          $ref: "#/components/schemas/DiscussionConclusion"
        archivedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        dialogueSettings:
          $ref: "#/components/schemas/DialogueSettings"
      required:
        - id
        - theme
        - conclusion
        - archivedAt
        - dialogueSettings
    Comment:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        discussionId:
          $ref: "#/components/schemas/Id"
        parentCommentId:
          oneOf:
            - $ref: "#/components/schemas/Id"
            - type: "null"
        commentType:
          $ref: "#/components/schemas/CommentType"
        content:
          $ref: "#/components/schemas/CommentContent"
        status:
          $ref: "#/components/schemas/CommentStatus"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/CommentIssue"
        archivedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - discussionId
        - parentCommentId
        - commentType
        - content
        - status
        - issues
        - archivedAt
        - createdAt
    CommentIssue:
      type: object
      properties:
        issueId:
          $ref: "#/components/schemas/Id"
      required:
        - issueId
paths:
  /v1/dialogue/issues:
    get:
      description: list issues
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/discussions:
    get:
      description: get discussions
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscussionSummary"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/discussions/{discussionId}:
    get:
      description: get discussion
      parameters:
        - schema:
            $ref: "#/components/schemas/Id"
          required: true
          name: discussionId
          in: path
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/discussions/{discussionId}/comments:
    get:
      description: get comments for a discussion
      parameters:
        - schema:
            $ref: "#/components/schemas/Id"
          required: true
          name: discussionId
          in: path
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create comment
      parameters:
        - schema:
            $ref: "#/components/schemas/Id"
          required: true
          name: discussionId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  oneOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
                commentType:
                  $ref: "#/components/schemas/CommentType"
                content:
                  $ref: "#/components/schemas/CommentContent"
              required:
                - parentCommentId
                - commentType
                - content
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/discussions/{discussionId}/comments/{commentId}/issues:
    post:
      description: add issue to comment
      parameters:
        - schema:
            $ref: "#/components/schemas/Id"
          required: true
          name: discussionId
          in: path
        - schema:
            $ref: "#/components/schemas/Id"
          required: true
          name: commentId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issueId:
                  $ref: "#/components/schemas/Id"
              required:
                - issueId
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
