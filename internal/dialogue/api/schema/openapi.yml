openapi: 3.1.0
info:
  title: app-supportocol dialogue api
  version: 1.0.0
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 599
        message:
          type: string
      required:
        - code
        - message
    Id:
      type: string
      format: uuid
    CommentStatus:
      type: string
      enum:
        - active
        - proposed
    DialogueSettings:
      type: object
      properties:
        discussionId:
          $ref: "#/components/schemas/Id"
        commentFrame:
          $ref: "#/components/schemas/CommentFrame"
      required:
        - discussionId
        - commentFrame
    CommentFrame:
      type: object
      properties:
        types:
          type: array
          items:
            $ref: "#/components/schemas/CommentType"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/CommentPath"
      required:
        - types
        - paths
    CommentPath:
      type: object
      properties:
        child:
          $ref: "#/components/schemas/CommentType"
        parent:
          $ref: "#/components/schemas/CommentType"
      required:
        - child
        - parent
    DiscussionTheme:
      type: string
      maxLength: 255
    DiscussionConclusion:
      type: string
      maxLength: 1000
    CommentType:
      type: string
      maxLength: 20
    CommentContent:
      type: string
      maxLength: 400
    CommentIssueTitle:
      type: string
      maxLength: 255
    CommentIssueDescription:
      type: string
      maxLength: 1000
    DiscussionSummary:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        workspaceId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        archivedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        lastCommentedAt:
          type: string
          format: date-time
      required:
        - id
        - workspaceId
        - theme
        - archivedAt
        - lastCommentedAt
    Discussion:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        workspaceId:
          $ref: "#/components/schemas/Id"
        theme:
          $ref: "#/components/schemas/DiscussionTheme"
        conclusion:
          $ref: "#/components/schemas/DiscussionConclusion"
        archivedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        dialogueSettings:
          $ref: "#/components/schemas/DialogueSettings"
      required:
        - id
        - workspaceId
        - theme
        - conclusion
        - archivedAt
        - dialogueSettings
    Comment:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        discussionId:
          $ref: "#/components/schemas/Id"
        parentCommentId:
          oneOf:
            - $ref: "#/components/schemas/Id"
            - type: "null"
        type:
          $ref: "#/components/schemas/CommentType"
        content:
          $ref: "#/components/schemas/CommentContent"
        status:
          $ref: "#/components/schemas/CommentStatus"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/CommentIssue"
        archivedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - discussionId
        - parentCommentId
        - type
        - content
        - status
        - issues
        - archivedAt
        - createdAt
    CommentIssue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Id"
        title:
          $ref: "#/components/schemas/CommentIssueTitle"
        description:
          $ref: "#/components/schemas/CommentIssueDescription"
      required:
        - id
        - title
        - description
  parameters:
    workspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    discussionId:
      name: discussionId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
    commentId:
      name: commentId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Id"
paths:
  /v1/dialogue/discussions:
    get:
      description: get public discussions
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscussionSummary"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/workspaces/{workspaceId}/discussions/{discussionId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    get:
      description: get discussion
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/workspaces/{workspaceId}/discussions/{discussionId}/comments:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
    get:
      description: get comments for a discussion
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      description: create comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentCommentId:
                  oneOf:
                    - $ref: "#/components/schemas/Id"
                    - type: "null"
                commentType:
                  $ref: "#/components/schemas/CommentType"
                content:
                  $ref: "#/components/schemas/CommentContent"
              required:
                - parentCommentId
                - commentType
                - content
      responses:
        "201":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/dialogue/workspaces/{workspaceId}/discussions/{discussionId}/comments/{commentId}/issues:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - $ref: "#/components/parameters/discussionId"
      - $ref: "#/components/parameters/commentId"
    post:
      description: add issue to comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/CommentIssueTitle"
                description:
                  $ref: "#/components/schemas/CommentIssueDescription"
              required:
                - title
                - description
      responses:
        "200":
          description: success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          description: default error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
