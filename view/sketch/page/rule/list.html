<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ルール一覧 - Supportocol</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        line-height: 1.5;
        color: #24292f;
        background-color: #ffffff;
        margin: 0;
        padding: 0;
      }

      .header {
        background-color: #24292f;
        color: #ffffff;
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header-logo {
        font-weight: bold;
        font-size: 20px;
        color: #ffffff;
        text-decoration: none;
      }

      .container {
        max-width: 1012px;
        margin: 0 auto;
        padding: 24px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        border-bottom: 1px solid #d0d7de;
        padding-bottom: 16px;
      }

      .page-title {
        font-size: 24px;
        font-weight: 400;
        margin: 0;
      }

      .btn {
        display: inline-block;
        padding: 5px 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        white-space: nowrap;
        vertical-align: middle;
        cursor: pointer;
        user-select: none;
        border: 1px solid;
        border-radius: 6px;
        appearance: none;
        text-decoration: none;
      }

      .btn-primary {
        color: #ffffff;
        background-color: #1f883d;
        border-color: rgba(27, 31, 36, 0.15);
        box-shadow: 0 1px 0 rgba(27, 31, 36, 0.1);
      }

      .btn-primary:hover {
        background-color: #1a7f37;
      }

      .rule-list {
        border: 1px solid #d0d7de;
        border-radius: 6px;
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .rule-item {
        padding: 16px;
        border-bottom: 1px solid #d0d7de;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .rule-item:last-child {
        border-bottom: none;
      }

      .rule-item:hover {
        background-color: #f6f8fa;
      }

      .rule-content {
        flex: 1;
      }

      .rule-title {
        font-size: 16px;
        font-weight: 600;
        color: #0969da;
        text-decoration: none;
        margin-bottom: 4px;
        display: block;
      }

      .rule-title:hover {
        text-decoration: underline;
      }

      .rule-description {
        font-size: 14px;
        color: #57606a;
        margin-bottom: 8px;
      }

      .rule-meta {
        font-size: 12px;
        color: #57606a;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .search-box {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
      }

      .form-control {
        padding: 5px 12px;
        font-size: 14px;
        line-height: 20px;
        color: #24292f;
        vertical-align: middle;
        background-color: #ffffff;
        background-repeat: no-repeat;
        background-position: right 8px center;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        box-shadow: inset 0 1px 0 rgba(208, 215, 222, 0.2);
        flex: 1;
      }

      .form-control:focus {
        border-color: #0969da;
        outline: none;
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <a href="#" class="header-logo">Supportocol</a>
    </header>

    <div class="container">
      <div class="page-header">
        <h1 class="page-title">ルール一覧</h1>
        <a href="#" class="btn btn-primary">新規ルール作成</a>
      </div>

      <div class="search-box">
        <input type="text" class="form-control" placeholder="ルールを検索..." />
      </div>

      <ul class="rule-list">
        <li class="rule-item">
          <div class="rule-content">
            <a href="#" class="rule-title">ディベート標準ルール</a>
            <div class="rule-description">
              肯定側と否定側に分かれて議論を行うための標準的なルールセットです。
            </div>
            <div class="rule-meta">
              <span class="meta-item">作成者: admin</span>
              <span class="meta-item">更新日: 2023/10/01</span>
            </div>
          </div>
        </li>
        <li class="rule-item">
          <div class="rule-content">
            <a href="#" class="rule-title">ブレインストーミング</a>
            <div class="rule-description">
              アイデアを自由に出し合うためのルール。批判的なコメントを制限しています。
            </div>
            <div class="rule-meta">
              <span class="meta-item">作成者: user123</span>
              <span class="meta-item">更新日: 2023/09/28</span>
            </div>
          </div>
        </li>
        <li class="rule-item">
          <div class="rule-content">
            <a href="#" class="rule-title">意思決定プロセス</a>
            <div class="rule-description">
              提案から決定までのプロセスを定義したルール。承認フローを含みます。
            </div>
            <div class="rule-meta">
              <span class="meta-item">作成者: manager</span>
              <span class="meta-item">更新日: 2023/09/15</span>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </body>
</html>
