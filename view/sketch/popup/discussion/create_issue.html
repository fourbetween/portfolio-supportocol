<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>指摘作成 - Supportocol</title>
    <style>
      :root {
        --color-fg-default: #24292f;
        --color-canvas-default: #ffffff;
        --color-border-default: #d0d7de;
        --color-btn-primary-bg: #cf222e;
        --color-btn-primary-text: #ffffff;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        padding: 20px;
        color: var(--color-fg-default);
        background-color: var(--color-canvas-default);
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      select,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        box-sizing: border-box;
        font-family: inherit;
      }
      textarea {
        height: 150px;
        resize: vertical;
      }
      .btn {
        display: inline-block;
        padding: 5px 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        cursor: pointer;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        background-color: var(--color-btn-primary-bg);
        color: var(--color-btn-primary-text);
      }
    </style>
  </head>
  <body>
    <h2>指摘作成</h2>
    <p>選択したコメントに対する論理的な問題を指摘します。</p>
    <form>
      <div class="form-group">
        <label for="type">指摘の種類</label>
        <select id="type">
          <option value="contradiction">矛盾</option>
          <option value="circular_reasoning">循環論法</option>
          <option value="fallacy">誤謬</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="description">説明</label>
        <textarea
          id="description"
          placeholder="問題点を具体的に説明してください..."
        ></textarea>
      </div>
      <button type="submit" class="btn">指摘する</button>
    </form>
  </body>
</html>
