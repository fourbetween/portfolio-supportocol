    <link

      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0d6cd9",
              "background-light": "#f5f7f8",
              "background-dark": "#101822",
              "github-blue": "#0969DA",

              "github-text-primary": "#24292F",
              "github-green": "#1A7F37",

              "dark-bg": "#0d1117",

    <style>

      }
      .color-badge {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        border: 1px solid rgba(0, 0, 0, 0.1);

      <!-- Header -->

        <div class="flex items-center gap-3">
          <div

          </div>
          <div>
            <h1
              class="text-github-text-primary dark:text-dark-text-primary text-xl font-semibold"
            >
              ルールの作成
            </h1>
            <p

            >
              コメントの種類と経路を定義してください
            </p>
          </div>
        </div>
        <button
          aria-label="Close"
          class="p-2 rounded-lg text-github-text-secondary dark:text-dark-text-secondary hover:bg-github-gray-bg dark:hover:bg-dark-bg transition-colors"
        >
          <span class="material-symbols-outlined">close</span>

          <div class="grid grid-cols-1 gap-4">
            <div>
              <label

              </label>
              <input

                id="rule-name"
                placeholder="例: 標準的な議論フロー"
                type="text"
              />
            </div>
            <div>
              <label
                class="block text-github-text-primary dark:text-dark-text-primary text-sm font-medium mb-2"
                for="rule-description"
              >
                説明
              </label>
              <textarea

                id="rule-description"
                placeholder="このルールの目的や使い方を説明してください"

            </div>
          </div>
        </section>

        <div

                    delete
                  </span>
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- Footer Actions -->
      <footer
        class="flex items-center justify-between px-6 py-4 border-t border-github-border dark:border-dark-border bg-github-gray-bg dark:bg-dark-bg"
      >
        <button
          class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-github-text-secondary dark:text-dark-text-secondary hover:bg-white dark:hover:bg-dark-panel-bg border border-github-border dark:border-dark-border transition-colors"
        >
          キャンセル
        </button>
        <div class="flex items-center gap-3">
          <button
            class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-github-text-primary dark:text-dark-text-primary hover:bg-white dark:hover:bg-dark-panel-bg border border-github-border dark:border-dark-border transition-colors"
          >
            <span class="material-symbols-outlined text-base">save</span>
            下書き保存
          </button>
          <button
            class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium bg-github-green text-white hover:bg-green-700 transition-colors shadow-sm"
          >
            <span class="material-symbols-outlined text-base">check</span>
            ルールを作成
          </button>
        </div>
      </footer>
    </div>

    <!-- Toggle Dark Mode (for demo purposes) -->
    <button
      class="fixed bottom-6 right-6 p-3 rounded-full bg-github-text-primary dark:bg-dark-text-primary text-white dark:text-dark-bg shadow-lg hover:shadow-xl transition-all"
      onclick="document.documentElement.classList.toggle('dark')"
    >
      <span class="material-symbols-outlined">dark_mode</span>
    </button>
  </body>
</html>
