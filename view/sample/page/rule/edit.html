<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ルール詳細・エディタ - Supportocol</title>
    <style>
      :root {
        --color-fg-default: #24292f;
        --color-fg-muted: #57606a;
        --color-canvas-default: #ffffff;
        --color-canvas-subtle: #f6f8fa;
        --color-border-default: #d0d7de;
        --color-border-muted: #d8dee4;
        --color-accent-fg: #0969da;
        --color-btn-primary-bg: #2da44e;
        --color-btn-primary-text: #ffffff;
        --color-danger-fg: #cf222e;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        line-height: 1.5;
        color: var(--color-fg-default);
        margin: 0;
        padding: 0;
        background-color: var(--color-canvas-subtle);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Header */
      .page-header {
        margin-bottom: 24px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .breadcrumb {
        font-size: 14px;
        color: var(--color-accent-fg);
        margin-bottom: 16px;
      }
      .breadcrumb a {
        text-decoration: none;
        color: var(--color-accent-fg);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0;
      }

      .header-actions {
        display: flex;
        gap: 8px;
      }

      /* Buttons */
      .btn {
        display: inline-block;
        padding: 5px 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        white-space: nowrap;
        vertical-align: middle;
        cursor: pointer;
        user-select: none;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        background-color: var(--color-canvas-default);
        color: var(--color-fg-default);
        text-decoration: none;
      }

      .btn:hover {
        background-color: #f3f4f6;
        border-color: var(--color-border-muted);
      }

      .btn-primary {
        background-color: var(--color-btn-primary-bg);
        color: var(--color-btn-primary-text);
        border-color: rgba(27, 31, 36, 0.15);
      }

      .btn-primary:hover {
        background-color: #2c974b;
      }

      .btn-sm {
        padding: 3px 12px;
        font-size: 12px;
      }

      .btn-danger-text {
        color: var(--color-danger-fg);
        border: none;
        background: none;
        padding: 4px 8px;
      }
      .btn-danger-text:hover {
        background-color: #ffebe9;
        text-decoration: underline;
      }

      /* Cards & Sections */
      .section {
        background-color: var(--color-canvas-default);
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--color-border-muted);
      }

      .section-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }

      /* Forms */
      .form-group {
        margin-bottom: 16px;
      }

      .form-label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .form-control {
        width: 100%;
        padding: 5px 12px;
        font-size: 14px;
        line-height: 20px;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        box-sizing: border-box;
      }

      textarea.form-control {
        min-height: 80px;
        resize: vertical;
      }

      /* Comment Type Card */
      .comment-type-card {
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        margin-bottom: 16px;
        overflow: hidden;
      }

      .comment-type-header {
        padding: 12px 16px;
        background-color: #f6f8fa;
        border-bottom: 1px solid var(--color-border-default);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .comment-type-title {
        font-weight: 600;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .color-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
      }

      .comment-type-body {
        padding: 16px;
      }

      .checkbox-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 8px;
        margin-top: 8px;
        padding: 12px;
        background-color: var(--color-canvas-subtle);
        border-radius: 6px;
        border: 1px solid var(--color-border-muted);
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .checkbox-item input[type="checkbox"] {
        margin: 0;
      }

      .helper-text {
        font-size: 12px;
        color: var(--color-fg-muted);
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="breadcrumb">
        <a href="../pagelist.md">Top</a>
        /
        <a href="rules.html">ルール一覧</a>
        / 基本的な議論
      </div>

      <div class="page-header">
        <div>
          <h1>基本的な議論</h1>
          <p
            style="
              color: var(--color-fg-muted);
              font-size: 14px;
              margin-top: 4px;
            "
          >
            ルールの詳細設定と構造定義
          </p>
        </div>
        <div class="header-actions">
          <button class="btn">変更を破棄</button>
          <button class="btn btn-primary">保存する</button>
        </div>
      </div>

      <!-- 基本情報 -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">基本情報</h2>
        </div>
        <div class="form-group">
          <label class="form-label">ルール名</label>
          <input type="text" class="form-control" value="基本的な議論" />
        </div>
        <div class="form-group">
          <label class="form-label">説明</label>
          <textarea class="form-control">
論理的な議論を行うための基本的なルールセットです。</textarea
          >
        </div>
      </div>

      <!-- 構造定義 -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">構造定義 (コメント種類と経路)</h2>
          <a href="../popup/rule/add_comment_type.html" class="btn btn-sm">
            + コメント種類を追加
          </a>
        </div>

        <p class="helper-text" style="margin-bottom: 16px">
          各コメント種類に対して、返信として許可するコメント種類（子コメント）を選択してください。
        </p>

        <!-- 主張 -->
        <div class="comment-type-card">
          <div
            class="comment-type-header"
            style="border-left: 4px solid #0969da"
          >
            <div class="comment-type-title">
              <span class="color-dot" style="background-color: #0969da"></span>
              主張 (Proposition)
            </div>
            <button class="btn-danger-text">削除</button>
          </div>
          <div class="comment-type-body">
            <div class="form-group">
              <label class="form-label">
                このコメントへの返信として許可するもの
              </label>
              <div class="checkbox-grid">
                <label class="checkbox-item">
                  <input type="checkbox" disabled />
                  主張 (Proposition)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  質問 (Question)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" />
                  回答 (Answer)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  反論 (Objection)
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- 質問 -->
        <div class="comment-type-card">
          <div
            class="comment-type-header"
            style="border-left: 4px solid #d29922"
          >
            <div class="comment-type-title">
              <span class="color-dot" style="background-color: #d29922"></span>
              質問 (Question)
            </div>
            <button class="btn-danger-text">削除</button>
          </div>
          <div class="comment-type-body">
            <div class="form-group">
              <label class="form-label">
                このコメントへの返信として許可するもの
              </label>
              <div class="checkbox-grid">
                <label class="checkbox-item">
                  <input type="checkbox" />
                  主張 (Proposition)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" />
                  質問 (Question)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  回答 (Answer)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" />
                  反論 (Objection)
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- 回答 -->
        <div class="comment-type-card">
          <div
            class="comment-type-header"
            style="border-left: 4px solid #1a7f37"
          >
            <div class="comment-type-title">
              <span class="color-dot" style="background-color: #1a7f37"></span>
              回答 (Answer)
            </div>
            <button class="btn-danger-text">削除</button>
          </div>
          <div class="comment-type-body">
            <div class="form-group">
              <label class="form-label">
                このコメントへの返信として許可するもの
              </label>
              <div class="checkbox-grid">
                <label class="checkbox-item">
                  <input type="checkbox" />
                  主張 (Proposition)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  質問 (Question)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" />
                  回答 (Answer)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  反論 (Objection)
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- 反論 -->
        <div class="comment-type-card">
          <div
            class="comment-type-header"
            style="border-left: 4px solid #cf222e"
          >
            <div class="comment-type-title">
              <span class="color-dot" style="background-color: #cf222e"></span>
              反論 (Objection)
            </div>
            <button class="btn-danger-text">削除</button>
          </div>
          <div class="comment-type-body">
            <div class="form-group">
              <label class="form-label">
                このコメントへの返信として許可するもの
              </label>
              <div class="checkbox-grid">
                <label class="checkbox-item">
                  <input type="checkbox" />
                  主張 (Proposition)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  質問 (Question)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" />
                  回答 (Answer)
                </label>
                <label class="checkbox-item">
                  <input type="checkbox" checked />
                  反論 (Objection)
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
