<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>プロジェクト削除 - Supportocol</title>
    <style>
      :root {
        --color-fg-default: #24292f;
        --color-fg-muted: #57606a;
        --color-canvas-default: #ffffff;
        --color-border-default: #d0d7de;
        --color-danger-fg: #cf222e;
        --color-btn-danger-bg: #da3633;
        --color-btn-danger-text: #ffffff;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        line-height: 1.5;
        color: var(--color-fg-default);
        margin: 0;
        padding: 20px;
        background-color: var(--color-canvas-default);
      }

      h2 {
        font-size: 20px;
        margin-top: 0;
        margin-bottom: 16px;
      }

      .warning-text {
        margin-bottom: 16px;
      }

      .danger-text {
        color: var(--color-danger-fg);
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
      }

      .form-control {
        width: 100%;
        padding: 5px 12px;
        font-size: 14px;
        line-height: 20px;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        box-sizing: border-box;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 24px;
      }

      .btn {
        display: inline-block;
        padding: 5px 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        cursor: pointer;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        background-color: var(--color-canvas-default);
        color: var(--color-fg-default);
      }

      .btn-danger {
        color: var(--color-btn-danger-text);
        background-color: var(--color-btn-danger-bg);
        border-color: rgba(27, 31, 36, 0.15);
      }

      .btn-danger:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
    <script>
      function checkInput() {
        const input = document.getElementById("confirm-input");
        const btn = document.getElementById("delete-btn");
        const projectName = "AI倫理ガイドライン策定プロジェクト";

        if (input.value === projectName) {
          btn.disabled = false;
        } else {
          btn.disabled = true;
        }
      }

      function closePopup() {
        window.close();
      }

      function deleteProject() {
        alert("プロジェクトを削除しました");
        window.close();
      }
    </script>
  </head>
  <body>
    <h2>プロジェクトを削除しますか？</h2>

    <div class="warning-text">
      この操作は取り消せません。プロジェクト「
      <strong>AI倫理ガイドライン策定プロジェクト</strong>
      」とそれに関連する設定が削除されます。
      <br />
      <span class="danger-text">
        注意:
        紐づいている議論は削除されませんが、このプロジェクトとの関連付けは解除されます。
      </span>
    </div>

    <div class="form-group">
      <label class="form-label">
        確認のため、プロジェクト名を入力してください
      </label>
      <input
        type="text"
        id="confirm-input"
        class="form-control"
        oninput="checkInput()"
      />
    </div>

    <div class="actions">
      <button class="btn" onclick="closePopup()">キャンセル</button>
      <button
        id="delete-btn"
        class="btn btn-danger"
        onclick="deleteProject()"
        disabled
      >
        削除する
      </button>
    </div>
  </body>
</html>
