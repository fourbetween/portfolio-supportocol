<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>既存の議論を追加 - Supportocol</title>
    <style>
      :root {
        --color-fg-default: #24292f;
        --color-fg-muted: #57606a;
        --color-canvas-default: #ffffff;
        --color-canvas-subtle: #f6f8fa;
        --color-border-default: #d0d7de;
        --color-border-muted: #d8dee4;
        --color-accent-fg: #0969da;
        --color-btn-primary-bg: #2da44e;
        --color-btn-primary-text: #ffffff;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        line-height: 1.5;
        color: var(--color-fg-default);
        margin: 0;
        padding: 20px;
        background-color: var(--color-canvas-default);
      }

      h2 {
        font-size: 20px;
        margin-top: 0;
        margin-bottom: 16px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-control {
        width: 100%;
        padding: 5px 12px;
        font-size: 14px;
        line-height: 20px;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        box-sizing: border-box;
      }

      .search-results {
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        max-height: 300px;
        overflow-y: auto;
        margin-bottom: 16px;
      }

      .result-item {
        padding: 8px 12px;
        border-bottom: 1px solid var(--color-border-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .result-item:last-child {
        border-bottom: none;
      }

      .result-item:hover {
        background-color: var(--color-canvas-subtle);
      }

      .result-item.selected {
        background-color: #ddf4ff;
      }

      .discussion-title {
        font-weight: 600;
        font-size: 14px;
      }

      .discussion-meta {
        font-size: 12px;
        color: var(--color-fg-muted);
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn {
        display: inline-block;
        padding: 5px 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        cursor: pointer;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        background-color: var(--color-canvas-default);
        color: var(--color-fg-default);
      }

      .btn-primary {
        background-color: var(--color-btn-primary-bg);
        color: var(--color-btn-primary-text);
        border-color: rgba(27, 31, 36, 0.15);
      }
    </style>
    <script>
      function toggleItem(element) {
        element.classList.toggle("selected");
        const checkbox = element.querySelector('input[type="checkbox"]');
        checkbox.checked = element.classList.contains("selected");

        const selectedCount = document.querySelectorAll(
          ".result-item.selected"
        ).length;
        document.getElementById("add-btn").disabled = selectedCount === 0;
      }

      function closePopup() {
        window.close();
      }

      function addDiscussion() {
        const selectedCount = document.querySelectorAll(
          ".result-item.selected"
        ).length;
        alert(`${selectedCount}件の議論を追加しました`);
        window.close();
      }
    </script>
  </head>
  <body>
    <h2>既存の議論を追加</h2>

    <div class="form-group">
      <input type="text" class="form-control" placeholder="議論を検索..." />
    </div>

    <div class="search-results">
      <div class="result-item" onclick="toggleItem(this)">
        <input type="checkbox" name="discussion" style="pointer-events: none" />
        <div>
          <div class="discussion-title">
            リモートワーク推奨期間の延長に関する是非
          </div>
          <div class="discussion-meta">#122 opened by user2</div>
        </div>
      </div>
      <div class="result-item" onclick="toggleItem(this)">
        <input type="checkbox" name="discussion" style="pointer-events: none" />
        <div>
          <div class="discussion-title">2024年度 新規事業アイデア募集</div>
          <div class="discussion-meta">#98 archived by manager</div>
        </div>
      </div>
      <div class="result-item" onclick="toggleItem(this)">
        <input type="checkbox" name="discussion" style="pointer-events: none" />
        <div>
          <div class="discussion-title">オフィス移転プロジェクト</div>
          <div class="discussion-meta">#85 closed by admin</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="closePopup()">キャンセル</button>
      <button
        id="add-btn"
        class="btn btn-primary"
        onclick="addDiscussion()"
        disabled
      >
        追加
      </button>
    </div>
  </body>
</html>
